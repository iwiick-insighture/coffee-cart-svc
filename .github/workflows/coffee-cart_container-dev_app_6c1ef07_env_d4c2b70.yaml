      - main
    paths-ignore:
      - .github/workflows/**
      - .trivyignore
      - Readme.md
      - README.md
  workflow_dispatch: {}
  repository_dispatch:
    types: pipeline_2a9e52b5-ab0f-4b7c-a138-e1a973eff967
env:
  ENCODED_PIPELINE_SECRET: ${{secrets.COFFEECARTSVC_COFFEECART_CONTAINERDEV_APP_6C1EF07_ENV_D4C2B70}}
  COMMIT_ID: ${{github.event.client_payload.commitId || github.sha || github.run_id}}
  BRANCH_NAME: >-
    ${{github.event.client_payload.branchName || github.event.branch ||
    github.ref_name}}
  DEPLOY_STEP_SHOULD_DEPLOY: 'true'
jobs:
  code-scan:
    name: Code Scan
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: 'Run :: Checkout repository for Code Scan'
        uses: actions/checkout@v4
      - name: 'Run :: Checkout Specific Commit'
        env:
          COMMIT_ID: ${{ github.event.client_payload.commitId }}
          BRANCH_NAME: ${{ github.event.client_payload.branchName }}
        if: >-
          ${{ github.event.client_payload.commitId != null ||
          github.event.client_payload.branchName != null }}
        run: |2-

              echo "Starting the checkout process..."
              git fetch --all
              if [ -n "$COMMIT_ID" ]; then
                echo "Commit ID provided: $COMMIT_ID"
                git checkout $COMMIT_ID || true
                echo "Checked out to commit ID: $COMMIT_ID"
              elif [ -n "$BRANCH_NAME" ]; then
                echo "Branch name provided: $BRANCH_NAME"
                git checkout $BRANCH_NAME || true
                echo "Checked out to branch: $BRANCH_NAME"

                #Updating the commit Id
                ACTUAL_COMMIT_ID=$(git rev-parse HEAD)
                echo "Changing CommitId: $ACTUAL_COMMIT_ID"
                echo "COMMIT_ID=$ACTUAL_COMMIT_ID" >> $GITHUB_ENV
              else
                echo "Skipping checkout..."
              fi
            
      - name: 'Run :: Decoding Secrets'
        run: |2-

                if [ ! -x "$(command -v jq)" ]; then
                  echo "jq not found, installing..."
                  sudo apt-get update
                  sudo apt-get install -y jq
                fi
                echo "${{ env.ENCODED_PIPELINE_SECRET }}" | base64 --decode | jq -r 'to_entries[] | "\(.key)=\(.value)"' | while read line; do echo "$line" >> $GITHUB_ENV; echo "::add-mask::${line#*=}"; done
                
      - name: 'Run :: Install Semgrep, Scan and Print'
        run: >-
          docker run -i -v "${PWD}:/src" semgrep/semgrep semgrep /src --json
          --quiet > semgrep_results.json
      - name: 'Run :: Trivy Filesystem Scan'
        run: |2-

                  docker run --rm -v "${PWD}:/src" aquasec/trivy:0.69.3 fs /src --format json --quiet > trivy_results.json
                  # Minifying Json
                  jq -c '.' trivy_results.json > trivy_results.min.json
                  
      - name: 'Run :: Evaluate Trivy Results'
        run: |2-
             
                  SEVERITY="NONE"

                  echo "Evaluating Trivy results. Selected severity: '$SEVERITY'"

                  if [ "$SEVERITY" = "NONE" ]; then
                    echo "Severity is NONE. No vulnerabilities will be printed or evaluated."
                    exit 0
                  fi

                  if [ -z "$SEVERITY" ]; then
                    echo "Severity empty. Printing ALL vulnerabilities."

                    jq '
                      .Results[]
                      | select(.Vulnerabilities?)
                      | {
                          Target: .Target,
                          Vulnerabilities: (
                            .Vulnerabilities[]
                            | {ID: .VulnerabilityID, Severity: .Severity, Description: .Description}
                          )
                        }
                    ' trivy_results.min.json

                    # If any vulnerabilities exist at all
                    if jq -e '
                      .Results
                      | map(select(.Vulnerabilities))
                      | length > 0
                    ' trivy_results.min.json >/dev/null; then
                      echo "IS_TRIVY_VULNERABILITIES_DETECTED=true" >> $GITHUB_ENV
                    fi

                    exit 0
                  fi

                  # First: check if any vulnerabilities match this severity
                  if jq -e '
                    .Results
                    | map(select(.Vulnerabilities))
                    | .[].Vulnerabilities
                    | map(select(.Severity == "'"$SEVERITY"'"))
                    | length > 0
                  ' trivy_results.min.json >/dev/null; then

                    echo "Vulnerabilities detected for severity: $SEVERITY"
                    echo "IS_TRIVY_VULNERABILITIES_DETECTED=true" >> $GITHUB_ENV

                    # Print ONLY matching severity (console only)
                    jq '
                      .Results[]
                      | select(.Vulnerabilities?)
                      | {
                          Target: .Target,
                          Vulnerabilities: (
                            .Vulnerabilities[]
                            | select(.Severity == "'"$SEVERITY"'")
                            | {ID: .VulnerabilityID, Severity: .Severity, Description: .Description}
                          )
                        }
                    ' trivy_results.min.json
                  else
                    echo "No vulnerabilities found for severity: $SEVERITY"
                  fi
                
      - name: 'Run :: Trivy Filesystem Scan (Including Trivy Ignores)'
        run: |2-

                  docker run --rm -v "${PWD}:/src" aquasec/trivy:0.69.3 fs /src --format json --quiet --report summary --dependency-tree > trivy_results.json
                  # Minifying Json
                  jq -c '.' trivy_results.json > trivy_results.min.json
                  # Generating SBOM in CycloneDX format
                  docker run --rm -v "${PWD}:/src" aquasec/trivy:0.69.3 fs /src --format cyclonedx --output /src/sbom.json
                  
      - name: 'Run :: Upload Code Scan Reports'
        env:
          RUN_ID: ${{ github.run_id }}
